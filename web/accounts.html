<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-endpoint" content="/api/v1/console/users" />
    <title>账号管理</title>
    <style>
      :root {
        --bg: #f7f8fa;
        --card: #ffffff;
        --text: #1c1f25;
        --muted: #6b7280;
        --accent: #2f80ed;
        --border: #e5e7eb;
        --danger: #e11d48;
        --success: #16a34a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", "Noto Sans SC", "Noto Sans JP", system-ui, -apple-system, sans-serif;
        min-height: 100vh;
      }

      .page {
        max-width: none;
        margin: 0;
        padding: 0;
      }

      main.shell-main .page-content {
        max-width: none;
      }

      .accounts-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 16px;
        align-items: start;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 20px;
        box-shadow: 0 6px 20px rgba(15, 23, 42, 0.05);
      }

      .section-head,
      .entry-head,
      .table-toolbar,
      .form-actions,
      .inline-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .section-head,
      .entry-head,
      .table-toolbar {
        justify-content: space-between;
      }

      .section-title,
      .entry-title {
        margin: 0;
        font-size: 15px;
        font-weight: 800;
      }

      .section-sub,
      .hint,
      .empty {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .field-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        min-height: 42px;
        padding: 10px 12px;
        border: 2px solid var(--border);
        border-radius: 10px;
        background: #fdfdfd;
        color: var(--text);
        font: inherit;
        font-size: 14px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      input:focus {
        outline: none;
        border-color: var(--accent);
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.1);
      }

      .check-row,
      .menu-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .check-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 34px;
        padding: 7px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #ffffff;
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
      }

      .check-pill input {
        margin: 0;
        accent-color: var(--accent);
      }

      button {
        min-height: 38px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), #1d4ed8);
        color: #ffffff;
        padding: 9px 16px;
        font: inherit;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(47, 128, 237, 0.2);
        transition: transform 0.08s ease, box-shadow 0.08s ease;
      }

      button.secondary {
        background: #ffffff;
        color: var(--text);
        border: 2px solid var(--border);
        box-shadow: none;
      }

      button.danger {
        background: #ffffff;
        color: var(--danger);
        border: 2px solid #fecdd3;
        box-shadow: none;
      }

      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      button:not(:disabled):hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 26px rgba(47, 128, 237, 0.26);
      }

      button.secondary:not(:disabled):hover,
      button.danger:not(:disabled):hover {
        box-shadow: none;
      }

      .message {
        display: none;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.5;
      }

      .message.show {
        display: block;
      }

      .message.success {
        background: #dcfce7;
        color: #166534;
        border: 1px solid #86efac;
      }

      .message.error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecdd3;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #ffffff;
        min-width: 720px;
      }

      th,
      td {
        border-bottom: 1px solid var(--border);
        padding: 11px 12px;
        text-align: left;
        vertical-align: middle;
        font-size: 13px;
      }

      th {
        background: #f9fafb;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tr.selected td {
        background: #eff6ff;
      }

      .status-pill,
      .menu-chip {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        padding: 2px 9px;
        font-size: 12px;
        font-weight: 800;
      }

      .status-pill.enabled {
        background: #dcfce7;
        color: #166534;
      }

      .status-pill.disabled {
        background: #f3f4f6;
        color: #4b5563;
      }

      .menu-list {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }

      .menu-chip {
        background: #eff6ff;
        color: #1d4ed8;
      }

      .row-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      .row-actions button {
        min-height: 32px;
        padding: 6px 10px;
      }

      .delete-confirm {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid #fecdd3;
        border-radius: 10px;
        background: #fff1f2;
        color: #9f1239;
        padding: 10px 12px;
        font-size: 13px;
      }

      [hidden] {
        display: none !important;
      }

      @media (max-width: 980px) {
        .accounts-layout {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .field-grid {
          grid-template-columns: 1fr;
        }

        .section-head,
        .entry-head,
        .table-toolbar,
        .form-actions,
        .delete-confirm {
          align-items: stretch;
          flex-direction: column;
        }

        .form-actions button,
        .delete-confirm button {
          width: 100%;
        }
      }
    </style>
    <link rel="stylesheet" href="/assets/shell.css?v=20260619" />
  </head>
  <body>
    <div class="page">
      <div class="accounts-layout">
        <main class="stack">
          <section class="card stack">
            <div class="section-head">
              <div>
                <h1 class="section-title">账号管理</h1>
                <div class="section-sub">子账号列表</div>
              </div>
              <button class="secondary" id="refresh-btn" type="button">刷新</button>
            </div>
            <div class="message" id="list-message"></div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>用户名</th>
                    <th>状态</th>
                    <th>权限</th>
                    <th>更新时间</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="users-body">
                  <tr>
                    <td colspan="5" class="empty">正在读取...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <section class="card stack">
            <div class="entry-head">
              <span class="entry-title">新建子账号</span>
            </div>
            <form class="stack" id="create-form">
              <div class="field-grid">
                <div>
                  <label for="create-username">用户名</label>
                  <input id="create-username" name="username" type="text" autocomplete="off" required />
                </div>
                <div>
                  <label for="create-password">初始密码</label>
                  <input id="create-password" name="password" type="password" autocomplete="new-password" required />
                </div>
              </div>
              <div>
                <label>可访问菜单</label>
                <div class="menu-grid" id="create-menus"></div>
              </div>
              <label class="check-pill">
                <input id="create-enabled" name="enabled" type="checkbox" checked />
                启用账号
              </label>
              <div class="message" id="create-message"></div>
              <div class="form-actions">
                <button id="create-submit" type="submit">创建账号</button>
                <button class="secondary" id="create-reset" type="button">清空</button>
              </div>
            </form>
          </section>
        </main>

        <aside class="card stack">
          <div class="entry-head">
            <span class="entry-title" id="edit-title">编辑子账号</span>
          </div>
          <div class="empty" id="edit-empty">未选择子账号</div>
          <form class="stack" id="edit-form" hidden>
            <div>
              <label for="edit-username">用户名</label>
              <input id="edit-username" type="text" disabled />
            </div>
            <div>
              <label for="edit-password">重置密码</label>
              <input id="edit-password" name="password" type="password" autocomplete="new-password" />
            </div>
            <div>
              <label>可访问菜单</label>
              <div class="menu-grid" id="edit-menus"></div>
            </div>
            <label class="check-pill">
              <input id="edit-enabled" name="enabled" type="checkbox" />
              启用账号
            </label>
            <div class="message" id="edit-message"></div>
            <div class="form-actions">
              <button id="edit-submit" type="submit">保存修改</button>
              <button class="danger" id="delete-open" type="button">删除账号</button>
            </div>
            <div class="delete-confirm" id="delete-confirm" hidden>
              <span id="delete-copy">确认删除该账号？</span>
              <span class="inline-row">
                <button class="danger" id="delete-submit" type="button">确认删除</button>
                <button class="secondary" id="delete-cancel" type="button">取消</button>
              </span>
            </div>
          </form>
        </aside>
      </div>
    </div>

    <script src="/assets/shell.js?v=20260619"></script>
    <script>
      const API_BASE = '/api/v1/console/users';
      const MENUS = [
        { id: 'test', label: '测试' },
        { id: 'config', label: '配置' },
        { id: 'evaluations', label: '模型测试' },
        { id: 'logs', label: '日志' },
      ];

      const state = {
        users: [],
        selected: null,
        deleting: false,
      };

      const els = {
        body: document.getElementById('users-body'),
        listMessage: document.getElementById('list-message'),
        refresh: document.getElementById('refresh-btn'),
        createForm: document.getElementById('create-form'),
        createMenus: document.getElementById('create-menus'),
        createMessage: document.getElementById('create-message'),
        createSubmit: document.getElementById('create-submit'),
        createReset: document.getElementById('create-reset'),
        editEmpty: document.getElementById('edit-empty'),
        editForm: document.getElementById('edit-form'),
        editTitle: document.getElementById('edit-title'),
        editUsername: document.getElementById('edit-username'),
        editPassword: document.getElementById('edit-password'),
        editMenus: document.getElementById('edit-menus'),
        editEnabled: document.getElementById('edit-enabled'),
        editMessage: document.getElementById('edit-message'),
        editSubmit: document.getElementById('edit-submit'),
        deleteOpen: document.getElementById('delete-open'),
        deleteConfirm: document.getElementById('delete-confirm'),
        deleteCopy: document.getElementById('delete-copy'),
        deleteSubmit: document.getElementById('delete-submit'),
        deleteCancel: document.getElementById('delete-cancel'),
      };

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function showMessage(node, type, text) {
        node.className = 'message';
        node.textContent = '';
        if (!text) return;
        node.textContent = text;
        node.classList.add('show', type);
      }

      function setBusy(button, busy) {
        button.disabled = busy;
      }

      function renderMenuChecks(root, name, selectedMenus) {
        const selected = new Set(selectedMenus || []);
        root.innerHTML = MENUS.map((menu) => `
          <label class="check-pill">
            <input type="checkbox" name="${name}" value="${escapeHtml(menu.id)}" ${selected.has(menu.id) ? 'checked' : ''} />
            ${escapeHtml(menu.label)}
          </label>
        `).join('');
      }

      function checkedMenus(root, name) {
        return Array.from(root.querySelectorAll(`input[name="${name}"]:checked`)).map((input) => input.value);
      }

      function formatTime(value) {
        if (!value) return '';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleString('zh-CN', { hour12: false });
      }

      async function readJson(response) {
        const text = await response.text();
        if (!text) return {};
        try {
          return JSON.parse(text);
        } catch (error) {
          return { detail: text };
        }
      }

      function errorText(status, payload) {
        const detail = payload && payload.detail ? payload.detail : '';
        return detail ? `${detail}` : `请求失败：${status}`;
      }

      async function request(path, options) {
        const response = await fetch(path, Object.assign({
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
        }, options || {}));
        const payload = await readJson(response);
        if (!response.ok) {
          throw new Error(errorText(response.status, payload));
        }
        return payload;
      }

      async function loadUsers() {
        showMessage(els.listMessage, '', '');
        els.body.innerHTML = '<tr><td colspan="5" class="empty">正在读取...</td></tr>';
        try {
          const payload = await request(API_BASE);
          state.users = Array.isArray(payload.users) ? payload.users : [];
          if (state.selected && !state.users.some((user) => user.username === state.selected)) {
            clearSelection();
          }
          renderUsers();
        } catch (error) {
          state.users = [];
          els.body.innerHTML = '<tr><td colspan="5" class="empty">读取失败</td></tr>';
          showMessage(els.listMessage, 'error', error.message);
        }
      }

      function renderUsers() {
        if (!state.users.length) {
          els.body.innerHTML = '<tr><td colspan="5" class="empty">暂无子账号</td></tr>';
          return;
        }
        els.body.innerHTML = state.users.map((user) => {
          const selected = user.username === state.selected ? ' class="selected"' : '';
          const statusClass = user.enabled ? 'enabled' : 'disabled';
          const statusText = user.enabled ? '启用' : '停用';
          const menuHtml = (user.menus || []).map((menu) => (
            `<span class="menu-chip">${escapeHtml(menuLabel(menu))}</span>`
          )).join('');
          return `
            <tr${selected} data-username="${escapeHtml(user.username)}">
              <td><strong>${escapeHtml(user.username)}</strong></td>
              <td><span class="status-pill ${statusClass}">${statusText}</span></td>
              <td><span class="menu-list">${menuHtml}</span></td>
              <td>${escapeHtml(formatTime(user.updated_at || user.created_at))}</td>
              <td>
                <div class="row-actions">
                  <button class="secondary" type="button" data-action="edit" data-username="${escapeHtml(user.username)}">编辑</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      }

      function menuLabel(menuId) {
        const menu = MENUS.find((item) => item.id === menuId);
        return menu ? menu.label : menuId;
      }

      function selectUser(username) {
        const user = state.users.find((item) => item.username === username);
        if (!user) return;
        state.selected = user.username;
        state.deleting = false;
        els.editEmpty.hidden = true;
        els.editForm.hidden = false;
        els.editTitle.textContent = `编辑：${user.username}`;
        els.editUsername.value = user.username;
        els.editPassword.value = '';
        els.editEnabled.checked = !!user.enabled;
        renderMenuChecks(els.editMenus, 'edit-menu', user.menus || []);
        showMessage(els.editMessage, '', '');
        updateDeleteConfirm();
        renderUsers();
      }

      function clearSelection() {
        state.selected = null;
        state.deleting = false;
        els.editEmpty.hidden = false;
        els.editForm.hidden = true;
        els.editTitle.textContent = '编辑子账号';
        showMessage(els.editMessage, '', '');
        updateDeleteConfirm();
      }

      function selectedUser() {
        return state.users.find((user) => user.username === state.selected);
      }

      function updateDeleteConfirm() {
        els.deleteConfirm.hidden = !state.deleting;
        const user = selectedUser();
        els.deleteCopy.textContent = user ? `确认删除 ${user.username}？` : '确认删除该账号？';
      }

      function resetCreateForm() {
        els.createForm.reset();
        document.getElementById('create-enabled').checked = true;
        renderMenuChecks(els.createMenus, 'create-menu', ['evaluations']);
        showMessage(els.createMessage, '', '');
      }

      async function createUser(event) {
        event.preventDefault();
        const formData = new FormData(els.createForm);
        const menus = checkedMenus(els.createMenus, 'create-menu');
        if (!menus.length) {
          showMessage(els.createMessage, 'error', '请至少选择一个菜单。');
          return;
        }
        setBusy(els.createSubmit, true);
        showMessage(els.createMessage, '', '');
        try {
          const user = await request(API_BASE, {
            method: 'POST',
            body: JSON.stringify({
              username: String(formData.get('username') || '').trim(),
              password: String(formData.get('password') || ''),
              menus,
              enabled: document.getElementById('create-enabled').checked,
            }),
          });
          resetCreateForm();
          showMessage(els.createMessage, 'success', `已创建 ${user.username}`);
          state.selected = user.username;
          await loadUsers();
          selectUser(user.username);
        } catch (error) {
          showMessage(els.createMessage, 'error', error.message);
        } finally {
          setBusy(els.createSubmit, false);
        }
      }

      async function updateUser(event) {
        event.preventDefault();
        const user = selectedUser();
        if (!user) return;
        const menus = checkedMenus(els.editMenus, 'edit-menu');
        if (!menus.length) {
          showMessage(els.editMessage, 'error', '请至少选择一个菜单。');
          return;
        }
        const payload = {
          menus,
          enabled: els.editEnabled.checked,
        };
        const password = els.editPassword.value;
        if (password) payload.password = password;
        setBusy(els.editSubmit, true);
        showMessage(els.editMessage, '', '');
        try {
          const updated = await request(`${API_BASE}/${encodeURIComponent(user.username)}`, {
            method: 'PUT',
            body: JSON.stringify(payload),
          });
          els.editPassword.value = '';
          showMessage(els.editMessage, 'success', `已保存 ${updated.username}`);
          state.selected = updated.username;
          await loadUsers();
          selectUser(updated.username);
        } catch (error) {
          showMessage(els.editMessage, 'error', error.message);
        } finally {
          setBusy(els.editSubmit, false);
        }
      }

      async function deleteUser() {
        const user = selectedUser();
        if (!user) return;
        setBusy(els.deleteSubmit, true);
        showMessage(els.editMessage, '', '');
        try {
          await request(`${API_BASE}/${encodeURIComponent(user.username)}`, { method: 'DELETE' });
          clearSelection();
          showMessage(els.listMessage, 'success', `已删除 ${user.username}`);
          await loadUsers();
        } catch (error) {
          showMessage(els.editMessage, 'error', error.message);
        } finally {
          setBusy(els.deleteSubmit, false);
        }
      }

      els.refresh.addEventListener('click', loadUsers);
      els.createForm.addEventListener('submit', createUser);
      els.createReset.addEventListener('click', resetCreateForm);
      els.editForm.addEventListener('submit', updateUser);
      els.deleteOpen.addEventListener('click', () => {
        state.deleting = true;
        updateDeleteConfirm();
      });
      els.deleteCancel.addEventListener('click', () => {
        state.deleting = false;
        updateDeleteConfirm();
      });
      els.deleteSubmit.addEventListener('click', deleteUser);
      els.body.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-action="edit"]');
        if (button) {
          selectUser(button.dataset.username);
          return;
        }
        const row = event.target.closest('tr[data-username]');
        if (row) selectUser(row.dataset.username);
      });

      renderMenuChecks(els.createMenus, 'create-menu', ['evaluations']);
      renderMenuChecks(els.editMenus, 'edit-menu', []);
      Shell.mount({
        page: 'accounts',
        defaultRoute: 'accounts',
        sidebar: () => [{ id: 'accounts', label: '账号管理' }],
      });
      loadUsers();
    </script>
  </body>
</html>
