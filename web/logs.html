<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>日志查看 - mercari-image-recognize</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 16px; background: #f6f7f9; color: #1f2328; }
  h1 { font-size: 18px; margin: 0 0 12px; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 10px 12px; background: #fff; border: 1px solid #d0d7de; border-radius: 6px; margin-bottom: 12px; }
  .toolbar label { font-size: 13px; }
  .toolbar input, .toolbar select { padding: 4px 6px; border: 1px solid #d0d7de; border-radius: 4px; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #d0d7de; border-radius: 6px; overflow: hidden; }
  th, td { padding: 8px 10px; text-align: left; font-size: 13px; border-bottom: 1px solid #eaeef2; vertical-align: top; }
  tr.row { cursor: pointer; }
  tr.row:hover { background: #f6f8fa; }
  .status-ok { color: #1a7f37; }
  .status-bad { color: #cf222e; }
  .details { background: #fafbfc; padding: 12px 24px; }
  .details h3 { font-size: 14px; margin: 12px 0 4px; }
  .llm-table th, .llm-table td { font-size: 12px; padding: 4px 8px; }
  pre.json { background: #f6f8fa; padding: 8px; max-height: 360px; overflow: auto; border-radius: 4px; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
  button { font-size: 12px; padding: 2px 8px; cursor: pointer; }
  .stats { color: #57606a; font-size: 12px; margin-left: auto; }
  .pill { display: inline-block; padding: 1px 6px; background: #ddf4ff; color: #0969da; border-radius: 10px; font-size: 11px; }
  .pill button { background: transparent; border: 0; color: #57606a; padding: 0 0 0 4px; cursor: pointer; }
  .job-link { color: #0969da; cursor: pointer; text-decoration: none; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 11px; }
  .job-link:hover { text-decoration: underline; }
  .image-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0; }
  .image-grid figure { margin: 0; }
  .image-grid img { display: block; width: 120px; height: 120px; object-fit: cover; border: 1px solid #d0d7de; border-radius: 4px; cursor: zoom-in; background: #fff; }
  .image-grid figcaption { font-size: 11px; color: #57606a; margin-top: 2px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; cursor: zoom-out; }
  .lightbox img { max-width: 92vw; max-height: 92vh; box-shadow: 0 4px 24px rgba(0,0,0,0.5); border-radius: 4px; }
  button.danger { background: #fff; border: 1px solid #cf222e; color: #cf222e; }
  button.danger:hover { background: #ffebe9; }
</style>
</head>
<body>
<h1>日志查看</h1>
<div class="toolbar">
  <label>时间: <select id="time-range">
    <option value="today">今天</option>
    <option value="24h">24小时</option>
    <option value="7d" selected>7天</option>
    <option value="">全部</option>
  </select></label>
  <label>端点:
    <select id="endpoint">
      <option value="">全部</option>
      <option>/api/v1/mercari/image/analyze</option>
      <option>/api/v1/mercari/title/analyze</option>
      <option>/api/v1/mercari/product-data/regenerate</option>
      <option>/api/v1/showcase/generate</option>
    </select>
  </label>
  <label>状态:
    <select id="error-kind">
      <option value="">全部</option>
      <option value="ok">成功</option>
      <option value="http_4xx">4xx</option>
      <option value="http_5xx">5xx</option>
      <option value="llm_failed">LLM失败</option>
      <option value="exception">异常</option>
    </select>
  </label>
  <label>慢请求(ms): <input id="min-duration" type="number" placeholder="0" style="width:80px"></label>
  <label>搜索: <input id="q" type="text" placeholder="error / brand / request_id" style="width:240px"></label>
  <label><input id="include-llm" type="checkbox"> 含 prompt/response</label>
  <span id="job-filter-pill" style="display:none"></span>
  <button id="refresh">刷新</button>
  <button id="clear-all" class="danger" title="清空全部日志">清空</button>
  <span class="stats" id="stats"></span>
</div>
<table>
  <thead>
    <tr><th>时间(UTC+8)</th><th>端点</th><th>状态</th><th>耗时</th><th>token</th><th>$</th><th>错误</th><th>job_id</th><th>request_id</th></tr>
  </thead>
  <tbody id="rows"></tbody>
</table>
<div style="text-align:center; padding:12px;"><button id="load-more">加载更多</button></div>

<script>
let nextCursor = null;
let currentJobFilter = '';
const COL_COUNT = 9;
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function fmtTime(iso) {
  // ISO string from server is UTC. Render in Asia/Shanghai (UTC+8), no DST.
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return esc(iso);
  const shifted = new Date(d.getTime() + 8 * 3600 * 1000);
  const pad = n => String(n).padStart(2, '0');
  return shifted.getUTCFullYear() + '-' + pad(shifted.getUTCMonth() + 1) + '-' + pad(shifted.getUTCDate())
    + ' ' + pad(shifted.getUTCHours()) + ':' + pad(shifted.getUTCMinutes()) + ':' + pad(shifted.getUTCSeconds());
}
function fmtTimeShort(iso) {
  const full = fmtTime(iso);
  return full ? full.slice(11) : '';  // HH:mm:ss
}
function timeFilter() {
  const sel = document.getElementById('time-range').value;
  if (!sel) return {};
  const now = new Date();
  const start = new Date(now);
  if (sel === 'today') {
    // "today" in Beijing = today after 00:00 UTC+8 = today after 16:00 UTC of prior day
    const beijingNow = new Date(now.getTime() + 8 * 3600 * 1000);
    beijingNow.setUTCHours(0, 0, 0, 0);
    start.setTime(beijingNow.getTime() - 8 * 3600 * 1000);
  } else if (sel === '24h') start.setTime(now.getTime() - 24*3600*1000);
  else if (sel === '7d') start.setTime(now.getTime() - 7*24*3600*1000);
  return {from: start.toISOString()};
}
function qs(params) {
  return Object.entries(params).filter(([,v])=>v!=='' && v!=null).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
}
async function fetchList(reset) {
  if (reset) { nextCursor = null; document.getElementById('rows').innerHTML = ''; }
  const params = Object.assign(
    {limit: 50},
    timeFilter(),
    {endpoint: document.getElementById('endpoint').value,
     error_kind: document.getElementById('error-kind').value,
     min_duration_ms: document.getElementById('min-duration').value,
     q: document.getElementById('q').value,
     include_llm_text: document.getElementById('include-llm').checked,
     job_id: currentJobFilter,
     cursor: nextCursor || ''}
  );
  const r = await fetch('/api/v1/logs/requests?' + qs(params), {credentials:'include'});
  if (!r.ok) { alert('请求失败: ' + r.status); return; }
  const body = await r.json();
  body.items.forEach(item => appendRow(item));
  nextCursor = body.next_cursor;
  document.getElementById('load-more').style.display = nextCursor ? 'inline' : 'none';
  refreshStats();
}
async function refreshStats() {
  const params = Object.assign({}, timeFilter());
  const r = await fetch('/api/v1/logs/stats?' + qs(params), {credentials:'include'});
  if (!r.ok) return;
  const s = await r.json();
  document.getElementById('stats').textContent =
    `总数 ${s.total} · 失败 ${(s.by_error_kind.http_4xx||0)+(s.by_error_kind.http_5xx||0)+(s.by_error_kind.llm_failed||0)+(s.by_error_kind.exception||0)} · tokens ${s.sum_tokens} · $${(s.sum_cost_usd||0).toFixed(4)}`;
}
function setJobFilter(jobId) {
  currentJobFilter = jobId || '';
  const pill = document.getElementById('job-filter-pill');
  if (currentJobFilter) {
    pill.style.display = 'inline-block';
    pill.className = 'pill';
    pill.innerHTML = 'job: ' + esc(currentJobFilter.slice(0, 12)) + (currentJobFilter.length > 12 ? '…' : '')
      + ' <button onclick="setJobFilter(\'\')">✕</button>';
  } else {
    pill.style.display = 'none';
  }
  fetchList(true);
}
function appendRow(item) {
  const tr = document.createElement('tr');
  tr.className = 'row';
  const statusClass = item.error_kind === 'ok' ? 'status-ok' : 'status-bad';
  const jobCell = item.job_id
    ? `<a class="job-link" onclick="event.stopPropagation(); setJobFilter('${esc(item.job_id)}')">${esc(item.job_id).slice(0, 8)}…</a>`
    : '';
  tr.innerHTML = `
    <td>${esc(fmtTime(item.timestamp_utc))}</td>
    <td>${esc(item.endpoint)}</td>
    <td class="${statusClass}">${esc(item.status_code||'')}</td>
    <td>${(item.duration_ms||0).toFixed(0)}ms</td>
    <td>${esc(item.total_tokens||'')}</td>
    <td>${(item.total_cost_usd||0).toFixed(4)}</td>
    <td class="${statusClass}">${esc(item.error_kind!=='ok'?item.error_kind:'')}</td>
    <td>${jobCell}</td>
    <td><code style="font-size:11px">${esc(item.request_id).slice(0,8)}…</code></td>`;
  tr.addEventListener('click', () => toggleDetails(tr, item.request_id));
  document.getElementById('rows').appendChild(tr);
}
async function toggleDetails(row, request_id) {
  const next = row.nextElementSibling;
  if (next && next.classList.contains('details-row')) {
    next.remove();
    return;
  }
  const r = await fetch('/api/v1/logs/requests/' + request_id, {credentials:'include'});
  if (!r.ok) return;
  const data = await r.json();
  const dr = document.createElement('tr');
  dr.className = 'details-row';
  const td = document.createElement('td');
  td.colSpan = COL_COUNT;
  td.className = 'details';
  dr.appendChild(td);
  row.parentNode.insertBefore(dr, row.nextSibling);
  // initial skeleton, then enrich with request.json
  td.innerHTML = renderDetails(data, null);
  try {
    const rj = await fetch(`/api/v1/logs/requests/${request_id}/files/request.json`, {credentials:'include'});
    if (rj.ok) {
      const reqBody = await rj.json();
      td.innerHTML = renderDetails(data, reqBody);
    }
  } catch (e) { /* leave skeleton */ }
}
function renderDetails(data, reqBody) {
  const rid = data.request.request_id;
  const links = `
    <button onclick="openFile('${esc(rid)}','request.json')">request.json</button>
    <button onclick="openFile('${esc(rid)}','response.json')">response.json</button>
    <button onclick="copyText('${esc(rid)}')">复制 request_id</button>
    ${data.request.job_id ? `<button onclick="setJobFilter('${esc(data.request.job_id)}')">按 job_id 过滤</button>` : ''}
  `;
  let html = `<h3>${esc(data.request.endpoint)} · ${esc(rid)}</h3>${links}`;

  // Request body preview (synthesized from reqBody if loaded)
  if (reqBody) {
    html += `<h3>请求内容</h3>`;
    const images = Array.isArray(reqBody.images) ? reqBody.images : [];
    if (images.length) {
      html += '<div class="image-grid">';
      for (const img of images) {
        const url = `/api/v1/logs/requests/${esc(rid)}/files/${esc(img.saved_as)}`;
        const sizeKb = img.size_bytes ? (img.size_bytes / 1024).toFixed(1) + ' KB' : '';
        html += `<figure>
          <img src="${url}" alt="${esc(img.filename)}" onclick="openLightbox(this.src)" loading="lazy">
          <figcaption title="${esc(img.filename)}">${esc(img.filename || img.saved_as)}<br>${esc(img.content_type)} ${sizeKb}</figcaption>
        </figure>`;
      }
      html += '</div>';
    }
    if (reqBody.body && reqBody.body.json !== undefined) {
      html += `<pre class="json">${esc(JSON.stringify(reqBody.body.json, null, 2))}</pre>`;
    } else if (reqBody.body && reqBody.body.size_bytes !== undefined) {
      html += `<div style="color:#57606a;font-size:12px">非 JSON body，原始 ${reqBody.body.size_bytes} 字节</div>`;
    }
    if (!images.length && !reqBody.body) {
      html += `<div style="color:#57606a;font-size:12px">（无请求体）</div>`;
    }
  } else {
    html += `<div style="color:#57606a;font-size:12px">加载请求内容中…</div>`;
  }

  if (data.job_siblings && data.job_siblings.length) {
    html += `<h3>同 job 兄弟请求 (${data.job_siblings.length})</h3>`;
    html += '<ul>' + data.job_siblings.map(s =>
      `<li>${esc(fmtTimeShort(s.timestamp_utc))} · ${esc(s.method)} ${esc(s.endpoint)} · ${esc(s.status_code)}</li>`).join('') + '</ul>';
  }
  if (data.llm_calls && data.llm_calls.length) {
    html += '<h3>LLM 调用</h3><table class="llm-table"><tr><th>时间</th><th>stage</th><th>attempt</th><th>model</th><th>状态</th><th>耗时</th><th>token</th><th>文件</th></tr>';
    for (const c of data.llm_calls) {
      const files = ['prompt_file','response_file','parsed_file']
        .filter(k => c[k]).map(k => {
          const name = c[k].split('/').pop();
          return `<button onclick="openFile('${esc(rid)}','${esc(name)}')">${esc(k.replace('_file',''))}</button>`;
        }).join(' ');
      html += `<tr><td>${esc(fmtTimeShort(c.timestamp_utc))}</td><td>${esc(c.stage)}</td><td>${esc(c.attempt)}</td><td>${esc(c.model)}</td><td>${esc(c.status)}</td><td>${(c.latency_ms||0).toFixed(0)}ms</td><td>${esc(c.total_tokens||'')}</td><td>${files}</td></tr>`;
    }
    html += '</table>';
  }
  return html;
}
async function openFile(rid, name) {
  const r = await fetch(`/api/v1/logs/requests/${rid}/files/${name}`, {credentials:'include'});
  if (!r.ok) { alert('文件读取失败: '+r.status); return; }
  const text = await r.text();
  const w = window.open('', '_blank');
  if (!w) { alert('窗口被浏览器拦截，请允许弹窗或在地址栏直接访问文件 URL。'); return; }
  w.document.write('<pre style="font:12px ui-monospace,monospace; white-space:pre-wrap">'+ text.replace(/</g,'&lt;') +'</pre>');
}
function openLightbox(src) {
  const box = document.createElement('div');
  box.className = 'lightbox';
  box.innerHTML = `<img src="${src}">`;
  box.addEventListener('click', () => box.remove());
  document.body.appendChild(box);
}
function copyText(t) { navigator.clipboard.writeText(t); }
async function clearAllLogs() {
  if (!confirm('确定清空所有日志？此操作不可恢复，将删除所有请求记录、LLM 调用记录和归档文件。')) return;
  const r = await fetch('/api/v1/logs/clear', {method: 'POST', credentials: 'include'});
  if (!r.ok) { alert('清空失败: ' + r.status); return; }
  const result = await r.json();
  const mb = (result.bytes_freed / 1024 / 1024).toFixed(2);
  alert(`已删除 ${result.rows_deleted} 条记录，释放 ${mb} MB。`);
  setJobFilter('');  // also clears the pill if any
  fetchList(true);
}
document.getElementById('refresh').addEventListener('click', () => fetchList(true));
document.getElementById('clear-all').addEventListener('click', clearAllLogs);
document.getElementById('load-more').addEventListener('click', () => fetchList(false));
document.querySelectorAll('#time-range,#endpoint,#error-kind').forEach(el =>
  el.addEventListener('change', () => fetchList(true)));
document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') fetchList(true); });
fetchList(true);
</script>
</body>
</html>
